<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Tracker</title>
    <link rel="icon" type="image/svg+xml" href="src/public/logo-only-bigoutsource.svg" />
  </head>
  <body>
    <script>
      // Prevent flash of wrong theme by applying .dark class synchronously
      try {
        if (JSON.parse(localStorage.getItem('eims_dark_mode'))) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
      // Apply saved text size synchronously to avoid a resize flash
      try {
        var ts = localStorage.getItem('eims_text_size');
        var sizes = { normal: '16px', large: '18px', xlarge: '20px' };
        if (ts && sizes[ts]) document.documentElement.style.fontSize = sizes[ts];
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
